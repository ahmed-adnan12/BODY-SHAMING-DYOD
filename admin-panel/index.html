<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Body Shaming Awareness Admin</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700;800&display=swap");

      :root {
        --pink: #f9a8d4;
        --yellow: #fde68a;
        --purple: #c4b5fd;
        --text: #f8f7ff;
        --danger: rgba(239, 68, 68, 0.34);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background: linear-gradient(140deg, #0f0c29 0%, #302b63 48%, #24243e 100%);
      }

      .shell { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .hidden { display: none !important; }
      .glass {
        border: 1px solid rgba(255,255,255,0.2);
        background: linear-gradient(160deg, rgba(255,255,255,0.15), rgba(255,255,255,0.04));
        backdrop-filter: blur(14px);
        border-radius: 18px;
        box-shadow: 0 20px 44px rgba(3,2,12,0.35);
      }

      h1,h2,h3 { font-family: "Sora", sans-serif; }
      input, button, textarea { font: inherit; }
      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        background: rgba(8,7,24,0.4);
        margin-top: 10px;
      }

      .btn { border: none; border-radius: 12px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
      .btn-primary { background: linear-gradient(90deg, var(--pink), var(--yellow), var(--purple)); color: #231a42; }

      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
      .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
      .tab { color: white; border: 1px solid rgba(255,255,255,0.28); background: rgba(255,255,255,0.08); }
      .tab.active { border-color: rgba(253,230,138,0.8); background: rgba(253,230,138,0.2); }
      .panel { margin-top: 18px; padding: 18px; }
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 14px; }
      .stat { padding: 14px; }
      .list { margin-top: 14px; display: grid; gap: 12px; }
      .story, .log-item {
        padding: 14px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(0,0,0,0.24);
      }
      .story.flagged { background: var(--danger); border-color: rgba(248,113,113,0.88); }
      .story-actions { display: flex; gap: 8px; margin-top: 12px; }
      .btn-flag { background: #fca5a5; color: #460707; }
      .btn-delete { background: #ef4444; color: white; }
      .muted { color: rgba(255,255,255,0.72); font-size: 0.92rem; }

      @media (max-width: 640px) { .shell { padding: 12px; } }
    </style>
  </head>
  <body>
    <!-- Login View -->
    <div id="loginView" class="login-wrap">
      <form id="loginForm" class="glass login-card">
        <h1 class="gradient-title" style="margin: 0 0 6px">Admin Access</h1>
        <p class="muted" style="margin-top: 0">Body Shaming Awareness dashboard</p>
        <label>Username</label>
        <input id="username" required value="admin" />
        <label style="display: block; margin-top: 12px">Password</label>
        <input id="password" type="password" required value="admin123" />
        <button class="btn btn-primary" style="width: 100%; margin-top: 16px" type="submit">Log In</button>
        <p id="loginError" class="muted" style="color: #fda4af"></p>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboardView" class="hidden">
      <div class="shell">
        <div class="topbar glass panel">
          <div>
            <h2 class="gradient-title" style="margin: 0">Campaign Admin Dashboard</h2>
            <p class="muted" style="margin: 4px 0 0">Monitor stories, moderate content, review activity logs.</p>
          </div>
          <button id="logoutBtn" class="btn" style="background: rgba(255,255,255,0.12); color: white">Logout</button>
        </div>

        <div class="tabs">
          <button class="btn tab active" data-tab="overview">Overview</button>
          <button class="btn tab" data-tab="stories">Stories</button>
          <button class="btn tab" data-tab="logs">Activity Logs</button>
        </div>

        <section id="overviewTab" class="glass panel">
          <div id="statsGrid" class="stats"></div>
          <h3 style="margin-top: 18px">Recent Stories</h3>
          <div id="recentStories" class="list"></div>
        </section>

        <section id="storiesTab" class="glass panel hidden">
          <h3 style="margin-top: 0">All Submitted Stories</h3>
          <div id="storyList" class="list"></div>
        </section>

        <section id="logsTab" class="glass panel hidden">
          <h3 style="margin-top: 0">Activity Logs</h3>
          <div id="logList" class="list"></div>
        </section>
      </div>
    </div>

    <script>
      const API_BASE = window.location.origin;
      const tokenKey = "bodyshaming_admin_token";

      const loginView = document.getElementById("loginView");
      const dashboardView = document.getElementById("dashboardView");
      const loginForm = document.getElementById("loginForm");
      const loginError = document.getElementById("loginError");

      const overviewTab = document.getElementById("overviewTab");
      const storiesTab = document.getElementById("storiesTab");
      const logsTab = document.getElementById("logsTab");

      function getToken() {
        return localStorage.getItem(tokenKey) || "";
      }

      async function request(path, options = {}, auth = true) {
        const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
        if (auth) headers.Authorization = `Bearer ${getToken()}`;
        const response = await fetch(`${API_BASE}${path}`, Object.assign({}, options, { headers }));
        if (!response.ok) throw new Error(await response.text() || "Request failed");
        return response.json();
      }

      function setTab(tabName) {
        document.querySelectorAll(".tab").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.tab === tabName);
        });
        overviewTab.classList.toggle("hidden", tabName !== "overview");
        storiesTab.classList.toggle("hidden", tabName !== "stories");
        logsTab.classList.toggle("hidden", tabName !== "logs");
      }

      async function renderOverview() {
        const stats = await request("/api/admin/stats");
        const statsGrid = document.getElementById("statsGrid");
        statsGrid.innerHTML = `
          <div class="glass stat"><p class="muted">Total Stories</p><h2>${stats.totalStories}</h2></div>
          <div class="glass stat"><p class="muted">Flagged Stories</p><h2>${stats.flaggedStories}</h2></div>
          <div class="glass stat"><p class="muted">Log Count</p><h2>${stats.logCount}</h2></div>
        `;

        const recentStories = document.getElementById("recentStories");
        if (!stats.recentStories.length) {
          recentStories.innerHTML = "<p class='muted'>No stories yet.</p>";
          return;
        }

        recentStories.innerHTML = stats.recentStories
          .map(
            (story) => `
              <article class="story ${story.flagged ? "flagged" : ""}">
                <p class="muted">ID: ${story._id}</p>
                <strong>${story.name}</strong>
                <p>${story.text}</p>
                <p class="muted">Flagged: ${story.flagged ? "Yes" : "No"}</p>
                <p class="muted">Created: ${new Date(story.createdAt).toLocaleString()}</p>
              </article>`
          )
          .join("");
      }

      async function renderStories() {
        const stories = await request("/api/admin/stories");
        const storyList = document.getElementById("storyList");

        if (!stories.length) {
          storyList.innerHTML = "<p class='muted'>No stories submitted yet.</p>";
          return;
        }

        storyList.innerHTML = stories
          .map(
            (story) => `
              <article class="story ${story.flagged ? "flagged" : ""}">
                <p class="muted">ID: ${story._id}</p>
                <strong>${story.name}</strong>
                <p>${story.text}</p>
                <p class="muted">Flagged: ${story.flagged ? "Yes" : "No"}</p>
                <p class="muted">Created: ${new Date(story.createdAt).toLocaleString()}</p>
                <div class="story-actions">
                  <button class="btn btn-flag" data-flag-id="${story._id}">${story.flagged ? "Unflag" : "Flag"}</button>
                  <button class="btn btn-delete" data-delete-id="${story._id}">Delete</button>
                </div>
              </article>`
          )
          .join("");

        // Attach event listeners for buttons
        storyList.querySelectorAll("[data-flag-id]").forEach((button) => {
          button.addEventListener("click", async () => {
            await request(`/api/admin/stories/${button.dataset.flagId}/flag`, { method: "PATCH" });
            await loadDashboard();
          });
        });

        storyList.querySelectorAll("[data-delete-id]").forEach((button) => {
          button.addEventListener("click", async () => {
            const ok = window.confirm("Delete this story permanently?");
            if (!ok) return;
            await request(`/api/admin/stories/${button.dataset.deleteId}`, { method: "DELETE" });
            await loadDashboard();
          });
        });
      }

      async function renderLogs() {
        const logs = await request("/api/admin/logs");
        const logList = document.getElementById("logList");

        if (!logs.length) {
          logList.innerHTML = "<p class='muted'>No user actions logged yet.</p>";
          return;
        }

        logList.innerHTML = logs
          .map(
            (log) => `
              <article class="log-item">
                <strong>${log.action}</strong>
                <p class="muted">${log.actor} - ${new Date(log.timestamp).toLocaleString()}</p>
              </article>`
          )
          .join("");
      }

      async function loadDashboard() {
        await Promise.all([renderOverview(), renderStories(), renderLogs()]);
      }

      async function verifySession() {
        const token = getToken();
        if (!token) return false;
        try { await request("/api/auth/verify"); return true; }
        catch { localStorage.removeItem(tokenKey); return false; }
      }

      async function showDashboard() {
        loginView.classList.add("hidden");
        dashboardView.classList.remove("hidden");
        setTab("overview");
        await loadDashboard();
      }

      // Login
      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginError.textContent = "";

        try {
          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value.trim();
          const response = await request(
            "/api/auth/login",
            { method: "POST", body: JSON.stringify({ username, password }) },
            false
          );

          localStorage.setItem(tokenKey, response.token);
          await showDashboard();
        } catch {
          loginError.textContent = "Login failed. Check username/password.";
        }
      });

      // Tab switch
      document.querySelectorAll(".tab").forEach((btn) => {
        btn.addEventListener("click", () => setTab(btn.dataset.tab));
      });

      // Logout
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem(tokenKey);
        dashboardView.classList.add("hidden");
        loginView.classList.remove("hidden");
      });

      // Auto-login if session exists
      (async () => {
        const valid = await verifySession();
        if (valid) await showDashboard();
      })();
    </script>
  </body>
</html>
